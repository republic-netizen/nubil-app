<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nubil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12141c;
    --panel:#191c26;
    --panel-2:#1f2330;
    --paper:#f4efe4;
    --paper-line:#e3dcc9;
    --amber:#e8a33d;
    --amber-dim:#5c471f;
    --teal:#4fb6a6;
    --text:#ece9e0;
    --muted:#8b8fa3;
    --card-ink:#20232d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }

  /* Sidebar */
  .sidebar{
    width:220px;
    flex-shrink:0;
    background:var(--panel);
    border-right:1px solid #262a38;
    display:flex;
    flex-direction:column;
    padding:24px 16px;
  }
  .brand{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:22px;
    letter-spacing:-0.01em;
    margin-bottom:4px;
  }
  .brand span{color:var(--amber);}
  .tagline{
    font-size:12px;
    color:var(--muted);
    margin-bottom:28px;
  }
  .section-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 10px 2px;
  }
  .subject-list{
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-bottom:28px;
  }
  .subject-chip{
    all:unset;
    cursor:pointer;
    font-size:13px;
    color:var(--text);
    background:var(--panel-2);
    border:1px solid transparent;
    border-radius:6px;
    padding:9px 12px;
    display:flex;
    align-items:center;
    gap:8px;
    transition:border-color .15s ease, background .15s ease;
  }
  .subject-chip:hover{border-color:#33384a;}
  .subject-chip.active{
    border-color:var(--amber);
    background:#241f16;
    color:var(--amber);
  }
  .subject-dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--teal);
    flex-shrink:0;
  }
  .subject-chip.active .subject-dot{background:var(--amber);}

  .sidebar-foot{
    margin-top:auto;
    font-size:11px;
    color:var(--muted);
    line-height:1.5;
    border-top:1px solid #262a38;
    padding-top:14px;
  }

  /* Main */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .topbar{
    padding:16px 28px;
    border-bottom:1px solid #262a38;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .topbar-left{
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }
  .menu-btn{
    all:unset;
    display:none;
    cursor:pointer;
    color:var(--text);
    flex-shrink:0;
    width:32px;height:32px;
    align-items:center;
    justify-content:center;
    border-radius:6px;
  }
  .menu-btn svg{width:20px;height:20px;}
  .menu-btn:hover{background:var(--panel-2);}
  .sidebar-backdrop{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:40;
  }
  .sidebar-backdrop.visible{display:block;}
  .topbar-title{
    font-family:'Fraunces',serif;
    font-size:16px;
    font-weight:500;
  }
  .topbar-sub{
    font-size:12px;
    color:var(--muted);
  }
  .clear-btn{
    all:unset;
    cursor:pointer;
    font-size:12px;
    color:var(--muted);
    border:1px solid #2c303e;
    padding:6px 12px;
    border-radius:6px;
  }
  .clear-btn:hover{color:var(--text);border-color:#454b60;}

  .chat-scroll{
    flex:1;
    overflow-y:auto;
    padding:32px 0 20px;
  }
  .chat-inner{
    max-width:720px;
    margin:0 auto;
    padding:0 28px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .empty-state{
    max-width:720px;
    margin:60px auto;
    padding:0 28px;
    text-align:center;
  }
  .empty-state h1{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:26px;
    margin:0 0 10px;
  }
  .empty-state p{
    color:var(--muted);
    font-size:14px;
    line-height:1.6;
    margin:0 auto 26px;
    max-width:440px;
  }
  .prompt-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
  }
  .prompt-suggest{
    all:unset;
    cursor:pointer;
    font-size:12.5px;
    color:var(--text);
    background:var(--panel-2);
    border:1px solid #2c303e;
    padding:8px 13px;
    border-radius:20px;
  }
  .prompt-suggest:hover{border-color:var(--amber);color:var(--amber);}

  /* Message cards */
  .msg-row{display:flex;}
  .msg-row.user{justify-content:flex-end;}
  .msg-row.assistant{justify-content:flex-start;}

  .card{
    max-width:82%;
    padding:14px 16px 12px;
    border-radius:3px 3px 10px 10px;
    position:relative;
    line-height:1.6;
    font-size:14.5px;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:6px;
    background-image:
      radial-gradient(circle at 8px 0, transparent 5px, var(--ink) 5.5px),
      linear-gradient(var(--_c), var(--_c));
    background-size:16px 12px, 100% 12px;
    background-repeat:repeat-x;
    background-position:0 -6px, 0 6px;
  }
  .card.user{
    --_c: #2a2113;
    background:#2a2113;
    border:1px solid var(--amber-dim);
    color:#f3e4c6;
    border-top-left-radius:10px;
  }
  .card.assistant{
    --_c: var(--paper);
    background:var(--paper);
    color:#2a2620;
    border:1px solid var(--paper-line);
    border-top-right-radius:10px;
  }
  .card .role-tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    opacity:0.55;
    display:block;
    margin-bottom:6px;
  }
  .card p{margin:0 0 10px;}
  .card p:last-child{margin-bottom:0;}
  .card ul, .card ol{margin:0 0 10px; padding-left:20px;}
  .card code{
    background:rgba(0,0,0,0.08);
    padding:1px 5px;
    border-radius:4px;
    font-family:'IBM Plex Mono',monospace;
    font-size:12.5px;
  }
  .card.user code{background:rgba(255,255,255,0.1);}
  .card pre{
    background:rgba(0,0,0,0.06);
    padding:10px 12px;
    border-radius:6px;
    overflow-x:auto;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    margin:0 0 10px;
  }

  .typing{
    display:flex;
    gap:4px;
    padding:4px 2px;
  }
  .typing span{
    width:5px;height:5px;border-radius:50%;
    background:#8b8478;
    animation:bounce 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{
    0%,60%,100%{transform:translateY(0); opacity:.5;}
    30%{transform:translateY(-4px); opacity:1;}
  }

  /* Input */
  .input-bar{
    border-top:1px solid #262a38;
    padding:16px 28px 20px;
  }
  .input-inner{
    max-width:720px;
    margin:0 auto;
    display:flex;
    align-items:flex-end;
    gap:10px;
    background:var(--panel-2);
    border:1px solid #2c303e;
    border-radius:12px;
    padding:8px 8px 8px 16px;
  }
  .input-inner:focus-within{border-color:var(--amber);}
  textarea{
    all:unset;
    flex:1;
    resize:none;
    max-height:140px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    line-height:1.5;
    padding:8px 0;
  }
  textarea::placeholder{color:var(--muted);}
  .send-btn{
    all:unset;
    cursor:pointer;
    width:34px;height:34px;
    border-radius:8px;
    background:var(--amber);
    color:#2a1d05;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    transition:opacity .15s ease;
  }
  .send-btn:disabled{opacity:0.35;cursor:default;}
  .send-btn svg{width:16px;height:16px;}
  .hint{
    max-width:720px;
    margin:8px auto 0;
    font-size:11px;
    color:var(--muted);
    text-align:center;
  }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#2c303e;border-radius:4px;}

  /* Password gate */
  .gate-overlay{
    position:fixed;
    inset:0;
    background:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
  }
  .gate-card{
    width:100%;
    max-width:320px;
    padding:0 24px;
    text-align:center;
  }
  .gate-brand{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:24px;
    margin-bottom:6px;
  }
  .gate-brand span{color:var(--amber);}
  .gate-sub{
    font-size:13px;
    color:var(--muted);
    margin-bottom:22px;
  }
  .gate-input{
    all:unset;
    box-sizing:border-box;
    width:100%;
    background:var(--panel-2);
    border:1px solid #2c303e;
    border-radius:8px;
    padding:11px 14px;
    color:var(--text);
    font-size:14px;
    margin-bottom:12px;
  }
  .gate-input:focus{border-color:var(--amber);}
  .gate-btn{
    all:unset;
    box-sizing:border-box;
    width:100%;
    cursor:pointer;
    background:var(--amber);
    color:#2a1d05;
    font-weight:600;
    font-size:14px;
    text-align:center;
    padding:11px 14px;
    border-radius:8px;
  }
  .gate-btn:disabled{opacity:0.5;cursor:default;}
  .gate-error{
    color:#e07a6b;
    font-size:12.5px;
    margin-top:10px;
    min-height:16px;
  }
  .app-shell{
    display:none;
    width:100%;
    height:100%;
  }
  .app-shell.visible{
    display:flex;
  }

  /* Mobile responsiveness */
  @media (max-width: 768px){
    .app-shell{
      position:relative;
    }
    .menu-btn{
      display:flex;
    }
    .sidebar{
      position:fixed;
      top:0; left:0; bottom:0;
      width:78%;
      max-width:280px;
      z-index:50;
      transform:translateX(-100%);
      transition:transform .2s ease;
      box-shadow:2px 0 24px rgba(0,0,0,0.4);
    }
    .sidebar.open{
      transform:translateX(0);
    }
    .topbar{
      padding:14px 16px;
    }
    .topbar-title{
      font-size:14.5px;
    }
    .topbar-sub{
      font-size:11px;
    }
    .clear-btn{
      font-size:11px;
      padding:6px 10px;
      flex-shrink:0;
    }
    .chat-inner{
      padding:0 14px;
      gap:14px;
    }
    .chat-scroll{
      padding:20px 0 14px;
    }
    .empty-state{
      margin:32px auto;
      padding:0 18px;
    }
    .empty-state h1{
      font-size:21px;
    }
    .empty-state p{
      font-size:13.5px;
    }
    .prompt-suggest{
      font-size:12px;
      padding:7px 11px;
    }
    .card{
      max-width:92%;
      font-size:14px;
      padding:12px 14px 10px;
    }
    .input-bar{
      padding:12px 14px 16px;
    }
    .input-inner{
      padding:6px 6px 6px 12px;
      border-radius:10px;
    }
    textarea{
      font-size:16px; /* prevents iOS auto-zoom on focus */
    }
    .send-btn{
      width:32px;height:32px;
    }
    .hint{
      font-size:10px;
      padding:0 6px;
    }
    .gate-card{
      max-width:280px;
    }
  }

  @media (max-width: 400px){
    .card{
      max-width:96%;
    }
    .prompt-row{
      gap:6px;
    }
  }
</style>
</head>
<body>

<div class="gate-overlay" id="gateOverlay">
  <div class="gate-card">
    <div class="gate-brand">Nub<span>il</span></div>
    <div class="gate-sub">Enter the access password to continue</div>
    <input type="password" class="gate-input" id="gateInput" placeholder="Password" autocomplete="off">
    <button class="gate-btn" id="gateBtn">Enter</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<div class="app-shell" id="appShell">
<div class="sidebar">
  <div class="brand">Nub<span>il</span></div>
  <div class="tagline">an AI study companion</div>

  <div class="section-label">Subjects</div>
  <div class="subject-list" id="subjectList">
    <button class="subject-chip active" data-subject="General"><span class="subject-dot"></span>General</button>
    <button class="subject-chip" data-subject="Math"><span class="subject-dot"></span>Math</button>
    <button class="subject-chip" data-subject="Science"><span class="subject-dot"></span>Science</button>
    <button class="subject-chip" data-subject="History"><span class="subject-dot"></span>History</button>
    <button class="subject-chip" data-subject="Writing"><span class="subject-dot"></span>Writing / English</button>
    <button class="subject-chip" data-subject="Languages"><span class="subject-dot"></span>Languages</button>
    <button class="subject-chip" data-subject="Test prep"><span class="subject-dot"></span>Test prep</button>
  </div>

  <div class="sidebar-foot">
    Answers study questions only, kept short and to the point. Off-topic questions get politely redirected.
  </div>
</div>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="main">
  <div class="topbar">
